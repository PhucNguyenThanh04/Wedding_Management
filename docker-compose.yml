version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: wedding_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Thanhphuc101204*
      POSTGRES_DB: Wedding_Management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wedding_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:Thanhphuc101204*@db:5432/Wedding_Management
    volumes:
      - ./uploads:/backend/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
